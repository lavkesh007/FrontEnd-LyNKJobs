<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- 🔥 Favicon (PNG + fallback) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/lynkjobslogo.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/lynkjobslogo.png?v=2" />
    <link rel="shortcut icon" href="/lynkjobslogo.png?v=2" />

    <!-- 🔥 Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 SEO Title -->
    <title>LynkJobs - Find Jobs, Internships & Career Opportunities</title>

    <!-- 🔥 SEO Description -->
    <meta name="description" content="LynkJobs is a modern job portal connecting job seekers with employers. Get daily job updates, apply easily, and grow your career." />

    <!-- 🔥 Keywords -->
    <meta name="keywords" content="jobs, job portal, fresher jobs, IT jobs, internships, LynkJobs, job updates India" />

    <!-- 🔥 Author -->
    <meta name="author" content="LynkJobs" />

    <!-- 🔥 Open Graph -->
    <meta property="og:title" content="LynkJobs - Find Your Dream Job" />
    <meta property="og:description" content="Get daily job updates, apply easily, and grow your career with LynkJobs." />
    <meta property="og:image" content="https://jobslynk.in/lynkjobslogo.png" />
    <meta property="og:url" content="https://jobslynk.in" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LynkJobs" />

    <!-- 🔥 Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LynkJobs - Job Portal" />
    <meta name="twitter:description" content="Daily job updates and easy applications." />
    <meta name="twitter:image" content="https://jobslynk.in/lynkjobslogo.png" />

    <!-- 🔥 Structured Data (VERY IMPORTANT) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LynkJobs",
      "url": "https://jobslynk.in"
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
